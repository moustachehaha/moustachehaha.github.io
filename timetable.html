<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>开票仪表盘 · 武汉 郑州</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060E;
  --s1:#0C0C18;
  --s2:#11111F;
  --border:#1C1C30;
  --border2:#242438;
  --text:#EEEEF8;
  --sub:#8888AA;
  --dim:#2A2A42;
  --glow1:#FF4D6D;
  --glow2:#C77DFF;
  --glow3:#48CAE4;
  --green:#52E5A0;
  --mono:'DM Mono',monospace;
}

html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans SC',sans-serif;
  min-height:100vh;
  padding:0 0 80px;
  overflow-x:hidden;
}

/* animated bg mesh */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 600px 400px at 10% 20%,#FF4D6D0A 0%,transparent 70%),
    radial-gradient(ellipse 500px 500px at 90% 80%,#C77DFF0A 0%,transparent 70%),
    radial-gradient(ellipse 400px 300px at 50% 50%,#48CAE408 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

.page{max-width:740px;margin:0 auto;padding:0 22px;position:relative;z-index:1}

/* ─── TOP BAR ─── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 0 0;
  border-bottom:1px solid var(--border);
  padding-bottom:20px;
  margin-bottom:36px;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--glow1),var(--glow2));
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.logo-text{font-size:15px;font-weight:700;letter-spacing:-0.01em}
.logo-sub{font-size:10px;color:var(--sub);margin-top:1px;letter-spacing:0.08em}
.ics-export-btn{
  display:flex;align-items:center;gap:7px;
  padding:8px 16px;border-radius:8px;
  background:var(--s1);border:1px solid var(--border2);
  color:var(--sub);font-size:11px;font-family:inherit;
  cursor:pointer;transition:all .2s;letter-spacing:0.05em;
  font-weight:500;
}
.ics-export-btn:hover{border-color:var(--glow2);color:var(--glow2);background:#C77DFF08}
.ics-export-btn svg{flex-shrink:0}

/* ─── HERO COUNTDOWN ─── */
.hero{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:18px;
  padding:32px 32px 28px;
  margin-bottom:28px;
  position:relative;overflow:hidden;
}
.hero::after{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse 300px 200px at 100% 0%,var(--glow1)12%,transparent 60%);
  opacity:.05;pointer-events:none;
}
.hero-eyebrow{
  display:flex;align-items:center;gap:8px;
  font-size:12px;letter-spacing:.2em;color:var(--sub);
  margin-bottom:18px;text-transform:uppercase;
}
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 6px var(--green);
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.hero-body{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap}
.hero-left{}
.hero-event-name{font-size:22px;font-weight:900;letter-spacing:-0.02em;line-height:1.2;margin-bottom:6px}
.hero-event-meta{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:8px}
.meta-pill{
  padding:2px 8px;border-radius:20px;border:1px solid;
  font-size:12px;font-weight:600;letter-spacing:.06em;
}

.cd-row{display:flex;align-items:flex-end;gap:4px;margin-top:4px}
.cd-unit{text-align:center;min-width:58px}
.cd-num{
  font-family:var(--mono);font-size:40px;font-weight:500;
  color:var(--glow1);line-height:1;display:block;
  text-shadow:0 0 30px var(--glow1)50;
  letter-spacing:-0.02em;
}
.cd-label{font-size:9px;color:var(--sub);letter-spacing:.12em;margin-top:4px}
.cd-colon{
  font-family:var(--mono);font-size:34px;color:var(--dim);
  padding-bottom:10px;line-height:1;
}
.all-done{font-size:16px;color:var(--green);font-weight:700;padding:8px 0}

/* hero progress */
.hero-progress{margin-top:24px}
.hp-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--sub);margin-bottom:7px;letter-spacing:.04em}
.hp-track{
  height:3px;background:var(--dim);border-radius:3px;overflow:hidden;
}
.hp-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--glow1),var(--glow2));
  transition:width .8s cubic-bezier(.22,1,.36,1);
}

/* ─── OVERALL PROGRESS ─── */
.overall{
  background:var(--s1);border:1px solid var(--border);
  border-radius:14px;padding:20px 24px;margin-bottom:28px;
}
.overall-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.overall-title{font-size:11px;letter-spacing:.14em;color:var(--sub);text-transform:uppercase}
.overall-frac{font-family:var(--mono);font-size:13px;color:var(--sub)}
.overall-frac span{color:var(--text);font-weight:500}
.steps{display:flex;gap:0;align-items:center}
.step{flex:1;position:relative}
.step-dot{
  width:10px;height:10px;border-radius:50%;
  border:2px solid var(--dim);background:var(--bg);
  margin:0 auto;position:relative;z-index:2;
  transition:all .4s;
}
.step.done .step-dot{background:var(--green);border-color:var(--green);box-shadow:0 0 8px var(--green)50}
.step.active .step-dot{background:var(--glow1);border-color:var(--glow1);box-shadow:0 0 10px var(--glow1)70}
.step-line{
  position:absolute;top:4px;left:50%;right:-50%;
  height:2px;background:var(--dim);z-index:1;
}
.step.done .step-line{background:var(--green)}
.step:last-child .step-line{display:none}
.step-name{font-size:9px;color:var(--sub);margin-top:7px;text-align:center;letter-spacing:.04em;line-height:1.3}
.step.done .step-name{color:var(--green)}
.step.active .step-name{color:var(--glow1)}

/* ─── TIMELINE ─── */
.tl-header{
  display:flex;align-items:center;gap:10px;
  font-size:11px;letter-spacing:.14em;color:var(--sub);
  text-transform:uppercase;margin-bottom:18px;
}
.tl-header::after{content:'';flex:1;height:1px;background:var(--dim)}

.timeline{position:relative;padding-left:0}
.tl-spine{
  position:absolute;left:130px;top:6px;bottom:6px;
  width:1px;
  background:linear-gradient(180deg,transparent,var(--dim) 8%,var(--dim) 92%,transparent);
}

.tl-group{margin-bottom:8px;opacity:0;transform:translateY(10px);animation:fadeUp .5s ease forwards}
.tl-group:nth-child(2){animation-delay:.08s}
.tl-group:nth-child(3){animation-delay:.16s}
.tl-group:nth-child(4){animation-delay:.24s}
@keyframes fadeUp{to{opacity:1;transform:none}}

.tl-row{
  display:flex;align-items:stretch;
  margin-bottom:8px;
}
.tl-date{
  width:130px;flex-shrink:0;
  text-align:right;padding-right:22px;
  padding-top:14px;
}
.tl-date-main{font-size:14px;font-weight:700;letter-spacing:-.01em}
.tl-date-day{font-size:10px;color:var(--sub);margin-top:2px;letter-spacing:.05em}
.tl-node{
  flex-shrink:0;width:0;
  display:flex;flex-direction:column;
  align-items:center;
  padding-top:18px;
}
.tl-dot{
  width:9px;height:9px;border-radius:50%;
  margin-left:-4px;flex-shrink:0;
  position:relative;z-index:2;
  transition:box-shadow .3s;
}
.tl-events{flex:1;padding-left:22px;display:flex;flex-direction:column;gap:7px}

.ev-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:10px;padding:12px 15px;
  display:flex;align-items:center;gap:12px;
  transition:all .2s;cursor:default;position:relative;overflow:hidden;
}
.ev-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:2px;border-radius:2px 0 0 2px;
  background:currentColor;opacity:0;transition:opacity .2s;
}
.ev-card:hover{background:var(--s2);transform:translateX(4px)}
.ev-card:hover::before{opacity:1}
.ev-card.is-next{border-color:var(--glow1)40;background:linear-gradient(135deg,#FF4D6D06,var(--s1))}
.ev-card.is-past{opacity:.4}

.ev-time{
  font-family:var(--mono);font-size:12px;color:var(--sub);
  min-width:34px;letter-spacing:.02em;
}
.ev-sep{width:1px;height:26px;background:var(--dim);flex-shrink:0}
.ev-ico{font-size:16px;flex-shrink:0}
.ev-body{flex:1;min-width:0}
.ev-body strong{font-size:14px;font-weight:600;display:block;margin-bottom:2px;line-height:1.2}
.ev-body small{font-size:12px;color:var(--sub)}
.ev-right{flex-shrink:0;text-align:right}
.ev-tag{
  font-size:12px;font-weight:700;letter-spacing:.09em;
  padding:2px 7px;border-radius:4px;border:1px solid;display:block;margin-bottom:5px;
}
.tag-a{background:#FF4D6D10;border-color:#FF4D6D30;color:var(--glow1)}
.tag-c{background:#C77DFF10;border-color:#C77DFF30;color:var(--glow2)}
.tag-p{background:#48CAE410;border-color:#48CAE430;color:var(--glow3)}
.ev-mini-cd{
  font-family:var(--mono);font-size:12px;
  color:var(--glow1);letter-spacing:.02em;white-space:nowrap;
}
.ev-mini-cd.is-done{color:var(--green)}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--s2);border:1px solid var(--border2);
  border-radius:10px;padding:11px 20px;
  font-size:14px;color:var(--text);z-index:999;
  transition:transform .3s cubic-bezier(.22,1,.36,1),opacity .3s;
  opacity:0;pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 32px #00000080;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:500px){
  .cd-num{font-size:30px}.cd-unit{min-width:44px}
  .hero{padding:22px 20px}
  .tl-date{width:90px;font-size:12px}
  .tl-spine{left:90px}
}
</style>
</head>
<body>
<div class="page">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">🎫</div>
      <div>
        <div class="logo-text">开票仪表盘</div>
        <div class="logo-sub">武汉 · 郑州 · 2026</div>
      </div>
    </div>
    <button class="ics-export-btn" onclick="downloadICS()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      导出日历 .ics
    </button>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-eyebrow">
      <div class="live-dot"></div>
      下一个时间节点
    </div>
    <div class="hero-body">
      <div class="hero-left">
        <div class="hero-event-name" id="heroName">—</div>
        <div class="hero-event-meta">
          <span id="heroDate" style="color:var(--sub)">—</span>
          <span class="meta-pill" id="heroCityPill" style="border-color:var(--glow1)40;color:var(--glow1)">—</span>
        </div>
      </div>
      <div>
        <div class="cd-row" id="cdRow">
          <div class="cd-unit"><span class="cd-num" id="cdD">--</span><div class="cd-label">天</div></div>
          <span class="cd-colon">:</span>
          <div class="cd-unit"><span class="cd-num" id="cdH">--</span><div class="cd-label">时</div></div>
          <span class="cd-colon">:</span>
          <div class="cd-unit"><span class="cd-num" id="cdM">--</span><div class="cd-label">分</div></div>
          <span class="cd-colon">:</span>
          <div class="cd-unit"><span class="cd-num" id="cdS">--</span><div class="cd-label">秒</div></div>
        </div>
        <div class="all-done" id="allDone" style="display:none">🎉 全部节点已完成</div>
      </div>
    </div>
    <div class="hero-progress">
      <div class="hp-meta">
        <span id="hpFrom">—</span>
        <span id="hpPct">0%</span>
        <span id="hpTo">—</span>
      </div>
      <div class="hp-track"><div class="hp-fill" id="hpFill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- OVERALL PROGRESS STEPPER -->
  <div class="overall">
    <div class="overall-top">
      <div class="overall-title">整体进度</div>
      <div class="overall-frac"><span id="stepDone">0</span> / <span id="stepTotal">8</span> 已完成</div>
    </div>
    <div class="steps" id="stepsRow"></div>
  </div>

  <!-- TIMELINE -->
  <div class="tl-header">时间轴明细</div>
  <div class="timeline">
    <div class="tl-spine"></div>
    <div id="tlContainer"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const EVENTS = [
  {id:0,date:'2026-03-13',time:'12:23',name:'官宣上架',desc:'武汉 · 郑州站正式官宣',city:'武汉/郑州',icon:'📢',tag:'announce',color:'#FF4D6D'},
  {id:1,date:'2026-03-13',time:'15:23',name:'武汉 · 倒计时开启',desc:'武汉场次倒计时开始',city:'武汉',icon:'⏳',tag:'countdown',color:'#C77DFF'},
  {id:2,date:'2026-03-16',time:'12:23',name:'武汉预售 · 4月10日场',desc:'武汉 4月10日场次预售开启',city:'武汉',icon:'🎫',tag:'presale',color:'#48CAE4'},
  {id:3,date:'2026-03-16',time:'12:53',name:'武汉预售 · 4月11日场',desc:'武汉 4月11日场次预售开启',city:'武汉',icon:'🎫',tag:'presale',color:'#48CAE4'},
  {id:4,date:'2026-03-16',time:'13:23',name:'武汉预售 · 4月12日场',desc:'武汉 4月12日场次预售开启',city:'武汉',icon:'🎫',tag:'presale',color:'#48CAE4'},
  {id:5,date:'2026-03-20',time:'12:23',name:'郑州 · 倒计时开启',desc:'郑州场次倒计时开始',city:'郑州',icon:'⏳',tag:'countdown',color:'#C77DFF'},
  {id:6,date:'2026-03-23',time:'12:23',name:'郑州预售 · 4月25日场',desc:'郑州 4月25日场次预售开启',city:'郑州',icon:'🎫',tag:'presale',color:'#48CAE4'},
  {id:7,date:'2026-03-23',time:'12:53',name:'郑州预售 · 4月26日场',desc:'郑州 4月26日场次预售（间隔暂定）',city:'郑州',icon:'🎫',tag:'presale',color:'#48CAE4'},
];

const GROUPS = [
  {date:'3月13日',day:'周五',ids:[0,1]},
  {date:'3月16日',day:'周一',ids:[2,3,4]},
  {date:'3月20日',day:'周五',ids:[5]},
  {date:'3月23日',day:'周一',ids:[6,7]},
];

const GROUP_COLORS = ['#FF4D6D','#C77DFF','#48CAE4','#52E5A0'];

function getTS(ev){
  const [y,mo,d]=ev.date.split('-').map(Number);
  const [h,m]=ev.time.split(':').map(Number);
  return new Date(y,mo-1,d,h,m,0,0).getTime();
}
function pad(n){return String(Math.max(0,Math.floor(n))).padStart(2,'0')}
function tagClass(t){return t==='announce'?'tag-a':t==='countdown'?'tag-c':'tag-p'}
function tagLabel(t){return t==='announce'?'官宣':t==='countdown'?'倒计时':'预售'}

// ─── Build stepper ───
const stepsRow = document.getElementById('stepsRow');
EVENTS.forEach((ev,i)=>{
  const step = document.createElement('div');
  step.className='step';
  step.id='step-'+i;
  step.innerHTML=`<div class="step-line"></div><div class="step-dot"></div><div class="step-name">${ev.date.slice(5).replace('-','/')}<br>${ev.time}</div>`;
  stepsRow.appendChild(step);
});

// ─── Build timeline ───
const tlContainer = document.getElementById('tlContainer');
GROUPS.forEach((g,gi)=>{
  const grpEl = document.createElement('div');
  grpEl.className='tl-group';
  const col = GROUP_COLORS[gi];
  let evHTML = '';
  g.ids.forEach(id=>{
    const ev = EVENTS[id];
    evHTML += `
    <div class="ev-card" id="evc-${id}" style="color:${ev.color}">
      <span class="ev-time">${ev.time}</span>
      <div class="ev-sep"></div>
      <span class="ev-ico">${ev.icon}</span>
      <div class="ev-body">
        <strong>${ev.name}</strong>
        <small>${ev.desc}</small>
      </div>
      <div class="ev-right">
        <span class="ev-tag ${tagClass(ev.tag)}">${tagLabel(ev.tag)}</span>
        <div class="ev-mini-cd" id="mcd-${id}">—</div>
      </div>
    </div>`;
  });
  grpEl.innerHTML=`
    <div class="tl-row">
      <div class="tl-date">
        <div class="tl-date-main" style="color:${col}">${g.date}</div>
        <div class="tl-date-day">${g.day}</div>
      </div>
      <div class="tl-node">
        <div class="tl-dot" style="background:${col};box-shadow:0 0 10px ${col}80"></div>
      </div>
      <div class="tl-events">${evHTML}</div>
    </div>`;
  tlContainer.appendChild(grpEl);
});

// ─── Tick ───
let prevNextId = null;

function tick(){
  const now = Date.now();
  const timestamps = EVENTS.map(getTS);

  // find next & prev
  let nextIdx = -1;
  for(let i=0;i<EVENTS.length;i++){
    if(timestamps[i]>now){nextIdx=i;break;}
  }
  const doneCount = EVENTS.filter((_,i)=>timestamps[i]<=now).length;

  // stepper
  document.getElementById('stepDone').textContent=doneCount;
  EVENTS.forEach((_,i)=>{
    const s=document.getElementById('step-'+i);
    s.classList.remove('done','active');
    if(timestamps[i]<=now) s.classList.add('done');
    else if(i===nextIdx) s.classList.add('active');
  });

  // hero
  if(nextIdx>=0){
    const nev = EVENTS[nextIdx];
    const diff = timestamps[nextIdx]-now;
    const totS = Math.max(1, (timestamps[nextIdx]-(nextIdx>0?timestamps[nextIdx-1]:now-1))/1000);
    const remS = diff/1000;
    const pct = Math.min(100,Math.max(0,Math.round((1-remS/totS)*100)));

    document.getElementById('heroName').textContent=nev.name;
    document.getElementById('heroDate').textContent=nev.date.slice(5).replace('-','月')+'日 '+nev.time;
    document.getElementById('heroCityPill').textContent=nev.city;
    document.getElementById('heroCityPill').style.color=nev.color;
    document.getElementById('heroCityPill').style.borderColor=nev.color+'40';

    const days=Math.floor(diff/86400000);
    const hrs=Math.floor(diff/3600000)%24;
    const mins=Math.floor(diff/60000)%60;
    const secs=Math.floor(diff/1000)%60;
    document.getElementById('cdD').textContent=pad(days);
    document.getElementById('cdH').textContent=pad(hrs);
    document.getElementById('cdM').textContent=pad(mins);
    document.getElementById('cdS').textContent=pad(secs);
    document.getElementById('cdRow').style.display='';
    document.getElementById('allDone').style.display='none';

    // progress bar
    document.getElementById('hpFill').style.width=pct+'%';
    document.getElementById('hpPct').textContent=pct+'%';
    if(nextIdx>0){
      const prev=EVENTS[nextIdx-1];
      document.getElementById('hpFrom').textContent=prev.date.slice(5).replace('-','月')+'日 '+prev.time;
    } else {
      document.getElementById('hpFrom').textContent='开始';
    }
    document.getElementById('hpTo').textContent=nev.date.slice(5).replace('-','月')+'日 '+nev.time;
  } else {
    document.getElementById('cdRow').style.display='none';
    document.getElementById('allDone').style.display='';
    document.getElementById('heroName').textContent='全部场次预售已完成';
    document.getElementById('heroDate').textContent='感谢关注，祝购票顺利！';
    document.getElementById('hpFill').style.width='100%';
    document.getElementById('hpPct').textContent='100%';
  }

  // mini countdowns + card states
  EVENTS.forEach((ev,i)=>{
    const ts=timestamps[i];
    const diff=ts-now;
    const card=document.getElementById('evc-'+i);
    const mcd=document.getElementById('mcd-'+i);
    card.classList.remove('is-next','is-past');
    if(diff<=0){
      card.classList.add('is-past');
      mcd.classList.add('is-done');
      mcd.textContent='✓ 已过';
    } else if(i===nextIdx){
      card.classList.add('is-next');
      mcd.classList.remove('is-done');
      const d=Math.floor(diff/86400000);
      const h=Math.floor(diff/3600000)%24;
      const m=Math.floor(diff/60000)%60;
      const s=Math.floor(diff/1000)%60;
      mcd.textContent=d>0?`剩${d}天${pad(h)}:${pad(m)}:${pad(s)}`:`剩${pad(h)}:${pad(m)}:${pad(s)}`;
    } else {
      mcd.classList.remove('is-done');
      const d=Math.floor(diff/86400000);
      const h=Math.floor(diff/3600000)%24;
      const m=Math.floor(diff/60000)%60;
      mcd.textContent=d>0?`${d}天后`:`${pad(h)}:${pad(m)}后`;
    }
  });
}

setInterval(tick,1000);
tick();

// ─── ICS Export ───
function downloadICS(){
  function pad2(n){return String(n).padStart(2,'0')}
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//开票提醒//ZH','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  EVENTS.forEach(ev=>{
    const [y,mo,d]=ev.date.split('-');
    const [h,m]=ev.time.split(':');
    const dtstart=`${y}${mo}${d}T${h}${m}00`;
    const endDt=new Date(+new Date(+y,+mo-1,+d,+h,+m)+30*60000);
    const dtend=`${endDt.getFullYear()}${pad2(endDt.getMonth()+1)}${pad2(endDt.getDate())}T${pad2(endDt.getHours())}${pad2(endDt.getMinutes())}00`;
    lines.push(
      'BEGIN:VEVENT',
      `DTSTART;TZID=Asia/Shanghai:${dtstart}`,
      `DTEND;TZID=Asia/Shanghai:${dtend}`,
      `SUMMARY:🎫 ${ev.name}`,
      `DESCRIPTION:${ev.desc}\\n城市：${ev.city}`,
      `LOCATION:${ev.city}`,
      'BEGIN:VALARM',
      'TRIGGER:-PT10M',
      'ACTION:DISPLAY',
      'DESCRIPTION:10分钟后开抢！',
      'END:VALARM',
      'BEGIN:VALARM',
      'TRIGGER:-PT1H',
      'ACTION:DISPLAY',
      'DESCRIPTION:1小时后开始，请提前准备',
      'END:VALARM',
      'END:VEVENT'
    );
  });
  lines.push('END:VCALENDAR');
  const blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='开票提醒.ics';a.click();
  showToast('📅 已下载 .ics，导入日历后将提前1小时和10分钟提醒');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}
